export default "<rg-header id='home' [isDark]=\"isDarkTheme | async\" [isMenuOpen]=\"isMenuOpen | async\"\n  (scrollToClicked)=\"scrollToClicked($event)\" (themeChanged)=\"themeChanged()\"\n  (languageChanged)=\"languageChanged($event)\" (openedDialog)='openDialog()' (menuChanged)=\"menuChanged($event)\"\n  (goToClicked)=\"goTo($event)\">\n</rg-header>\n<rg-landing class='max-width'></rg-landing>\n<rg-aboutme id='about-me' class='max-width'></rg-aboutme>\n<rg-skills id='skills' class='max-width'></rg-skills>\n<rg-work id='work' class='max-width'></rg-work>\n<rg-projects id='projects' class='max-width' (openedDialog)='openDialog()'></rg-projects>\n<rg-footer></rg-footer>\n\n<a id='up-btn' [color]=\"(isDarkTheme | async) ? 'secondary' : 'primary'\" mat-fab routerLink=\"/\"\n  (click)=\"scrollToClicked('home')\">\n  <mat-icon>keyboard_arrow_up</mat-icon>\n</a>\n"

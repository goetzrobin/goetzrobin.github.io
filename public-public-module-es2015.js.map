export default "<div *ngIf=\"(loading | async) || (loaded | async); else form\">\n  <div class='container' *ngIf=\"(loading | async); else success\">\n    <mat-spinner diameter='60'></mat-spinner>\n    <p>Getting to know you...</p>\n  </div>\n  <ng-template #success>\n    <div class='container' >\n      <div class='icon'>👋</div>\n      <p>I will reach out to you!</p>\n      <button mat-button mat-dialog-close>Close</button>\n    </div>\n  </ng-template>\n</div>\n\n<ng-template #form>\n  <h1 mat-dialog-title>🤝 Let's get to know each other</h1>\n  <div mat-dialog-content>\n    <form class=\"reachout-container\" [formGroup]=\"reachOutForm\">\n      <mat-form-field>\n        <input matInput placeholder=\"Your Name\" formControlName=\"name\" required>\n        <mat-error *ngIf=\"!reachOutForm.get('name').valid && reachOutForm.get('name').touched\">Don't be shy!</mat-error>\n      </mat-form-field>\n      <mat-form-field>\n        <input matInput type='email' placeholder=\"Your E-Mail\" formControlName=\"email\" required>\n        <mat-error *ngIf=\"!reachOutForm.get('email').valid && reachOutForm.get('email').touched\">Please enter a valid\n          E-Mail</mat-error>\n      </mat-form-field>\n      <mat-form-field>\n        <textarea matInput placeholder=\"Leave me a Message\" rows=\"10\" formControlName=\"text\"></textarea>\n      </mat-form-field>\n    </form>\n  </div>\n  <div mat-dialog-actions>\n    <button mat-button mat-dialog-close>Another Day</button>\n    <button color='primary' style='color: white;' mat-flat-button [disabled]=\"!reachOutForm.valid\" (click)=\"submit()\">🤙\n      Let's Go</button>\n  </div>\n</ng-template>\n"

export default "<mat-toolbar color='secondary'>\n<mat-toolbar-row>\n  <i id='main-logo'></i>\n  <span class=\"example-spacer\"></span>\n  <nav class='main-nav'>\n      <a routerLink=\"/\" routerLinkActive=\"active\"><button mat-button>Home</button></a>\n      <a routerLink=\"/about-me\" routerLinkActive=\"active\"><button mat-button>✋ About Me</button></a>\n      <a routerLink=\"/skills\" routerLinkActive=\"active\"><button mat-button>💪 Skills</button></a>\n      <a routerLink=\"/work\" routerLinkActive=\"active\"><button mat-button>👨‍💻 Work</button></a>\n      <a routerLink=\"/projects\" routerLinkActive=\"active\"><button mat-button>⚡️ Projects</button></a>\n      <button class='white' mat-flat-button color='primary' style='color: white;' (click)='openDialog()'>🤙 Reach Out</button>\n      <!-- <button mat-icon-button [matMenuTriggerFor]=\"menu\" aria-label=\"Example icon-button with a menu\">\n          <mat-icon>language</mat-icon>\n        </button>\n        <mat-menu #menu=\"matMenu\">\n          <button mat-menu-item (click)=\"changeLanguage('english')\">\n            🇺🇸 English\n            <mat-icon>dialpad</mat-icon> \n          </button>\n          <button mat-menu-item (click)=\"changeLanguage('deutsch')\">\n            🇩🇪 Deutsch\n          </button>\n          Coming Soon.\n        </mat-menu> -->\n        <button mat-icon-button (click)=\"toggleTheme()\">\n            <ng-container *ngIf=\"isDark; else elseTemplate\">\n               &nbsp;☀️\n            </ng-container>\n            <ng-template #elseTemplate>\n                &nbsp;🌙\n            </ng-template>\n            \n          </button>\n  </nav>\n  <nav>\n      <button class='mobile-nav__icon'mat-icon-button (click)=\"changeMenu(true)\">\n        <mat-icon>menu</mat-icon>\n      </button>\n      <div color=\"primary\" class='mobile-nav mat-app-background' *ngIf=\"isMenuOpen\">\n        <div class='mobile-nav__header'>  \n            <button mat-icon-button (click)=\"toggleTheme()\">\n                <ng-container *ngIf=\"isDark; else elseTemplate\">\n                   &nbsp;☀️\n                </ng-container>\n                <ng-template #elseTemplate>\n                    &nbsp;🌙\n                </ng-template>\n              </button>\n        <button class='mobile-nav__icon'mat-icon-button (click)=\"changeMenu(false)\">\n              <mat-icon>close</mat-icon>\n            </button>\n      </div>\n\n            <div class='mobile-nav__body'>\n                <button (click)=\"goTo('home')\" mat-button>Home</button>\n                <button (click)=\"goTo('about-me')\" mat-button>✋ About Me</button>\n                <button (click)=\"goTo('skills')\" mat-button>💪 Skills</button>\n                <button (click)=\"goTo('work')\" mat-button>👨‍💻 Work</button>\n                <button (click)=\"goTo('projects')\" mat-button>⚡️ Projects</button>\n                <button (click)=\"goTo('reach-out')\" mat-button>🤙Reach Out</button>\n            </div>\n           \n            <!-- <button mat-icon-button [matMenuTriggerFor]=\"menu\" aria-label=\"Example icon-button with a menu\">\n                <mat-icon>language</mat-icon>\n              </button>\n              <mat-menu #menu=\"matMenu\">\n                <button mat-menu-item (click)=\"changeLanguage('english')\">\n                  🇺🇸 English\n                  <mat-icon>dialpad</mat-icon> \n                </button>\n                <button mat-menu-item (click)=\"changeLanguage('deutsch')\">\n                  🇩🇪 Deutsch\n                </button>\n                Coming Soon.\n              </mat-menu> -->\n              \n      </div>\n  </nav>\n</mat-toolbar-row>\n</mat-toolbar>"
